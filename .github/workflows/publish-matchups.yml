name: Publish matchup page

# Rebuilds docs/index.html (the GitHub Pages site) on a weekly schedule.
# Default: an incremental update that scrapes only the current season and
# appends any round not already in the committed CSV — prior seasons and
# already-captured rounds are taken from the CSV and never re-scraped.
# Manual runs can skip the scrape entirely, or force a full re-scrape.

on:
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: "Rebuild the page from the committed CSV without scraping"
        type: boolean
        default: false
      full_rescrape:
        description: "Re-scrape every season from scratch (backfill/repair)"
        type: boolean
        default: false
  schedule:
    # Tuesday 20:00 UTC (~Wed 06:00 AEST) — after the weekend round completes
    # and the upcoming fixture is set.
    - cron: "0 20 * * 2"

permissions:
  contents: write

concurrency:
  group: publish-matchups
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests
        run: python3 test_parser.py

      - name: Refresh stats
        # Default = incremental (current season's new round only). Prior seasons
        # come from the committed CSV. full_rescrape forces a complete re-scrape.
        if: ${{ github.event.inputs.skip_scrape != 'true' }}
        run: |
          if [ "${{ github.event.inputs.full_rescrape }}" = "true" ]; then
            python3 update_stats.py --full
          else
            python3 update_stats.py
          fi

      - name: Build matchup page
        # Stats come from the (committed/refreshed) CSV; the fixture is pulled
        # live from Squiggle. No --insecure needed on GitHub's runners.
        run: python3 matchup_app.py --out docs/index.html

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games_2024_2026.csv docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Auto-refresh matchup page ($(date -u +%Y-%m-%d))"
            git push
          fi
