name: Fetch AFL Player Stats

on:
  workflow_dispatch:
    inputs:
      season_start:
        description: "First season year"
        required: false
        default: "2026"
      season_end:
        description: "Last season year (inclusive; blank = same as start)"
        required: false
        default: ""
      teams:
        description: "Comma-separated clubs to restrict to (blank = all)"
        required: false
        default: ""
  schedule:
    - cron: "0 8 * * 4"

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests
        run: python3 test_parser.py

      - name: Resolve seasons
        id: params
        run: |
          START="${{ github.event.inputs.season_start || '2026' }}"
          END="${{ github.event.inputs.season_end }}"
          if [ -z "$END" ]; then END="$START"; fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END"     >> "$GITHUB_OUTPUT"
          echo "teams=${{ github.event.inputs.teams }}" >> "$GITHUB_OUTPUT"

      - name: Fetch season totals (start season)
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          import afltables as afl
          season = int("${{ steps.params.outputs.start }}")
          out    = f"stats_{season}.csv"
          df = afl.get_season_stats(season)
          df.to_csv(out, index=False)
          print(f"Saved {len(df)} season-total rows to {out}")
          print(df.head(5).to_string(index=False))
          EOF

      - name: Fetch per-game stats
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          import afltables as afl
          start = int("${{ steps.params.outputs.start }}")
          end   = int("${{ steps.params.outputs.end }}")
          teams_raw = "${{ steps.params.outputs.teams }}".strip()
          teams = {t.strip() for t in teams_raw.split(",") if t.strip()} or None
          out   = f"games_{start}_{end}.csv"
          df = afl.get_game_stats(range(start, end + 1), teams=teams, delay=0.05)
          df.to_csv(out, index=False)
          print(f"Saved {len(df)} game rows "
                f"({df['player'].nunique() if not df.empty else 0} players) to {out}")
          print(df.head(10).to_string(index=False))
          EOF

      - name: Upload CSVs
        uses: actions/upload-artifact@v4
        with:
          name: afl-stats-${{ steps.params.outputs.start }}-${{ steps.params.outputs.end }}
          path: |
            stats_${{ steps.params.outputs.start }}.csv
            games_${{ steps.params.outputs.start }}_${{ steps.params.outputs.end }}.csv
          if-no-files-found: warn
          retention-days: 30
